<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendWear</title>

<!-- ✅ Plausible Analytics -->
<script defer 
data-domain="aribarahmanii.github.io" 
src="https://plausible.io/js/script.js">
</script>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f4f6f8;
}

/* Header */
header{
  background:#111;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.logo{
  font-size:24px;
  font-weight:bold;
}

.cart-box{
  background:orange;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
}

/* Search */
.search-bar{
  width:100%;
  padding:10px;
  border:none;
  margin-top:10px;
}

/* Products */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  cursor:pointer;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:10px;
}

/* Buttons */
button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.cart-btn{background:orange;color:white;}
.buy-btn{background:green;color:white;}
</style>

</head>

<body>

<header>
<div class="logo">TrendWear</div>
<div class="cart-box" onclick="goToCart()">🛒 <span id="cartCount">0</span></div>
<input class="search-bar" placeholder="Search..." onkeyup="searchProducts(this.value)">
</header>

<div class="products" id="productList"></div>

<script>

/* PRODUCTS */
const products = [
{
 id:"p1",
 name:"Casual T-Shirt",
 price:799,
 img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400"
},
{
 id:"p2",
 name:"Winter Hoodie",
 price:1499,
 img:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?w=400"
},
{
 id:"p3",
 name:"Blue Jeans",
 price:1999,
 img:"https://images.unsplash.com/photo-1582552938357-32b906df40cb?w=400"
},
{
 id:"p4",
 name:"Formal Shirt",
 price:1299,
 img:"https://images.unsplash.com/photo-1603252109303-2751441dd157?w=400"
}
];

/* SAVE PRODUCTS */
localStorage.setItem("products", JSON.stringify(products));

/* CART */
let cart = JSON.parse(localStorage.getItem("trendwear_cart")) || [];

/* RENDER PRODUCTS */
function renderProducts(list){
const container = document.getElementById("productList");
container.innerHTML = "";

list.forEach(p=>{
container.innerHTML += `
<div class="card" onclick="openProduct('${p.id}')">
<img src="${p.img}" loading="lazy">
<h3>${p.name}</h3>
<p>₹${p.price}</p>

<button class="cart-btn" onclick="event.stopPropagation(); addToCart('${p.id}')">Add</button>
<button class="buy-btn" onclick="event.stopPropagation(); buyNow('${p.id}')">Buy</button>
</div>
`;
});
}

/* UPDATE CART */
function updateCart(){
document.getElementById("cartCount").innerText = cart.length;
}

/* ADD TO CART */
function addToCart(id){
const product = products.find(p=>p.id===id);
cart.push({...product, qty:1});
localStorage.setItem("trendwear_cart", JSON.stringify(cart));
updateCart();

// ✅ Plausible Goal (Improved)
if(window.plausible){
  plausible('Add to Cart', {
    props: {
      product: product.name,
      price: product.price
    }
  });
}

alert("Added to cart!");
}

/* BUY NOW */
function buyNow(id){
const product = products.find(p=>p.id===id);

// ✅ Plausible Goal (Improved)
if(window.plausible){
  plausible('Buy Now Click', {
    props: {
      product: product.name,
      price: product.price
    }
  });
}

window.location.href = "checkout.html";
}

/* OPEN PRODUCT PAGE */
function openProduct(id){
window.location.href = "product.html?id=" + id;
}

/* GO TO CART */
function goToCart(){
window.location.href = "cart.html";
}

/* SEARCH */
function searchProducts(value){
value = value.toLowerCase();

const filtered = products.filter(p =>
p.name.toLowerCase().includes(value)
);

renderProducts(filtered);
}

/* INIT */
renderProducts(products);
updateCart();

</script>

</body>
</html>

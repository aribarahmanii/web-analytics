<!DOCTYPE html>
<html lang="en">
<head>
  <script defer data-domain="aribarahmanii.github.io" src="https://plausible.io/js/script.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendWear - Home</title>

<!-- ✅ GA4 Base Code -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9S5TH4V60W"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-9S5TH4V60W', {
  debug_mode: true
});
</script>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f4f6f8;
}

/* Header */
header{
  background:#111;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.logo{
  font-size:24px;
  font-weight:bold;
}

.cart-box{
  background:orange;
  padding:8px 14px;
  border-radius:20px;
  font-weight:bold;
}

/* Search */
.search-bar{
  width:100%;
  padding:10px;
  border:none;
  outline:none;
  margin-top:10px;
}

/* Product grid */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

/* Card */
.card{
  background:white;
  padding:15px;
  border-radius:12px;
  text-align:center;
  transition:0.3s;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.card img{
  width:100%;
  border-radius:8px;
}

/* Buttons */
button{
  padding:10px 14px;
  margin:6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.cart-btn{background:orange;color:white;}
.buy-btn{background:green;color:white;}

button:hover{
  opacity:0.9;
}
</style>
</head>

<body>

<header>
<div class="logo">TrendWear</div>
<div class="cart-box">🛒 Cart: <span id="cartCount">0</span></div>
<input class="search-bar" type="text" placeholder="Search products..." onkeyup="searchProducts(this.value)">
</header>

<div class="products" id="productList">

<!-- Product 1 -->
<div class="card" data-name="t-shirt">
<img src="https://via.placeholder.com/200x200.png?text=T-Shirt">
<h3>Casual T-Shirt</h3>
<p>₹799</p>
<button class="cart-btn" onclick="addToCart('Casual T-Shirt')">Add to Cart</button>
<button class="buy-btn" onclick="buyNow('Casual T-Shirt')">Buy Now</button>
</div>

<!-- Product 2 -->
<div class="card" data-name="hoodie">
<img src="https://via.placeholder.com/200x200.png?text=Hoodie">
<h3>Winter Hoodie</h3>
<p>₹1499</p>
<button class="cart-btn" onclick="addToCart('Winter Hoodie')">Add to Cart</button>
<button class="buy-btn" onclick="buyNow('Winter Hoodie')">Buy Now</button>
</div>

<!-- Product 3 -->
<div class="card" data-name="jeans">
<img src="https://via.placeholder.com/200x200.png?text=Jeans">
<h3>Blue Jeans</h3>
<p>₹1999</p>
<button class="cart-btn" onclick="addToCart('Blue Jeans')">Add to Cart</button>
<button class="buy-btn" onclick="buyNow('Blue Jeans')">Buy Now</button>
</div>

<!-- Product 4 -->
<div class="card" data-name="shirt">
<img src="https://via.placeholder.com/200x200.png?text=Shirt">
<h3>Formal Shirt</h3>
<p>₹1299</p>
<button class="cart-btn" onclick="addToCart('Formal Shirt')">Add to Cart</button>
<button class="buy-btn" onclick="buyNow('Formal Shirt')">Buy Now</button>
</div>

</div>

<script>
let cart = 0;

/* ✅ Add to Cart */
function addToCart(product) {
  cart++;
  document.getElementById("cartCount").innerText = cart;

  // 🔥 GA4 event
  gtag('event','add_to_cart',{
    product_name: product
  });
}

/* ✅ Buy Now */
function buyNow(product) {
  gtag('event','buy_now_click',{
    product_name: product
  });

  alert("Proceeding to checkout: " + product);
}

/* 🔍 Search */
function searchProducts(value){
  let cards = document.querySelectorAll(".card");
  value = value.toLowerCase();

  cards.forEach(card=>{
    let name = card.getAttribute("data-name");
    card.style.display = name.includes(value) ? "block" : "none";
  });
}
</script>

</body>

</html>
